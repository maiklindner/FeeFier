<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title id="pageTitle"></title>
  <link rel="stylesheet" href="options.css">
</head>

<body>

  <div class="container">
    <header>
      <div
        style="display: flex; justify-content: flex-end; width: 100%; margin-bottom: -1.5em; position: relative; z-index: 10;">
        <select id="langSelect"
          style="width: auto; padding: 6px; font-size: 0.85em; cursor: pointer; border: 1px solid var(--border-color); border-radius: 6px; background-color: var(--input-bg-color); color: var(--text-color);">
          <option value="auto">Auto (Browser)</option>
          <option value="en">English (en)</option>
          <option value="de">Deutsch (de)</option>
          <option value="es">Español (es)</option>
          <option value="fr">Français (fr)</option>
          <option value="ja">日本語 (ja)</option>
          <option value="pt_BR">Português (pt_BR)</option>
          <option value="zh_CN">中文 (zh_CN)</option>
        </select>
      </div>
      <h1 id="titleH1"></h1>
      <p id="optionsDescription"></p>
    </header>

    <main>
      <div class="feeds-header">
        <h2 id="feedsHeading">Feeds</h2>
        <div style="display: flex; gap: 8px;">
          <button id="importBtn" class="secondary-btn" type="button"></button>
          <button id="exportBtn" class="secondary-btn" type="button"></button>
          <button id="addFeedButton" class="primary-btn" type="button"></button>
        </div>
        <input type="file" id="importFile" accept=".json" class="hidden">
      </div>

      <div id="feedsContainer"></div>
      <div id="status"></div>
    </main>
  </div>

  <div id="toast" class="toast hidden">
    <span id="toastMessage"></span>
    <button id="toastUndoBtn" class="toast-undo-btn"></button>
  </div>

  <script src="options.js"></script>
</body>

</html>
